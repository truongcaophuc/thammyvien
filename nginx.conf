# telesales-app nginx config — serve SPA + proxy /api /graphql tới cep-netcore.
# Container chạy chung network cep_tinycrm-network để gọi cep-netcore theo tên.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache HTML không quá lâu (PWA SW tự update qua manifest)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # PWA Service Worker phải fresh mỗi lần check
    location ~ ^/(sw\.js|registerSW\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Asset bundle Vite (hash trong filename) → cache dài hạn
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: mọi route không match file → trả index.html cho React Router.
    # KHÔNG fallback /api hoặc /graphql (proxy riêng).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy CEP REST endpoints
    location /api/ {
        proxy_pass http://cep-netcore-graphql:5077;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Strip Secure cookie flag để browser HTTP nhận được cookie (dev/test deploy).
        # Production HTTPS thì có thể bỏ dòng này.
        proxy_cookie_flags ~ nosecure;
        proxy_read_timeout 60s;
    }

    # Proxy GraphQL endpoint (chỉ /graphql, không có trailing slash)
    location = /graphql {
        proxy_pass http://cep-netcore-graphql:5077;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_flags ~ nosecure;
        proxy_read_timeout 60s;
    }
}
